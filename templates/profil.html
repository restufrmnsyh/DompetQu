{% extends "base.html" %}
{% block title %}Profil — DompetQu{% endblock %}

{% block content %}
<div class="page-header">
  <a href="/" class="back-btn">
    <i class="bi bi-arrow-left"></i>
    Kembali
  </a>

  <h1>
    <i class="bi bi-person-circle"></i>
    Profil
  </h1>
</div>

<div class="profil-hero">
  <form id="form-foto" method="POST" action="/profil/foto" enctype="multipart/form-data">
    <label for="input-foto" class="profil-avatar-wrap" title="Ganti foto profil">
      {% if foto_profil %}
        <img src="{{ foto_profil }}" alt="Foto profil" class="profil-avatar profil-avatar-img" id="preview-avatar">
      {% else %}
        <div class="profil-avatar" id="preview-avatar">{{ username[0] | upper }}</div>
      {% endif %}
      <span class="profil-avatar-edit">
        <i class="bi bi-camera-fill"></i>
      </span>
    </label>
    <input
      type="file"
      name="foto"
      id="input-foto"
      accept="image/png, image/jpeg, image/webp"
      class="profil-avatar-input"
      onchange="document.getElementById('form-foto').submit()">
  </form>
  <div class="profil-username">{{ username }}</div>
  <div class="profil-sub">Anggota DompetQu</div>
</div>

<div class="card">
  <h2 class="card-title">
    <i class="bi bi-key-fill"></i>
    Ganti Password
  </h2>

  {% if pesan %}
    <div class="alert {% if 'berhasil' in pesan %}alert-success{% else %}alert-danger{% endif %}">
      {{ pesan }}
    </div>
  {% endif %}

  <form method="POST">
    <div class="form-group">
      <label>Password Lama</label>
      <input type="password" name="password_lama" required>
    </div>

    <div class="form-group">
      <label>Password Baru</label>
      <input type="password" name="password_baru" required minlength="4">
    </div>

    <button class="btn btn-full">
      <i class="bi bi-check-circle-fill"></i>
      Simpan Password
    </button>
  </form>
</div>

<div class="card">
  <h2 class="card-title">
    <i class="bi bi-database-fill"></i>
    Data & Backup
  </h2>

  <div class="action-list">

    <a href="/export" class="action-item">
      <span class="action-icon action-icon-green">
        <i class="bi bi-file-earmark-excel-fill"></i>
      </span>
      <span class="action-text">Export Excel</span>
      <i class="bi bi-chevron-right action-chevron"></i>
    </a>

    <a href="/backup" class="action-item">
      <span class="action-icon action-icon-blue">
        <i class="bi bi-cloud-arrow-down-fill"></i>
      </span>
      <span class="action-text">Backup JSON</span>
      <i class="bi bi-chevron-right action-chevron"></i>
    </a>

    <a href="/restore" class="action-item">
      <span class="action-icon action-icon-amber">
        <i class="bi bi-cloud-arrow-up-fill"></i>
      </span>
      <span class="action-text">Restore Data</span>
      <i class="bi bi-chevron-right action-chevron"></i>
    </a>

    <a href="/kategori" class="action-item">
      <span class="action-icon action-icon-purple">
        <i class="bi bi-tags-fill"></i>
      </span>
      <span class="action-text">Kelola Kategori</span>
      <i class="bi bi-chevron-right action-chevron"></i>
    </a>

  </div>
</div>

<div class="card">
  <a href="/logout" class="btn btn-full btn-danger">
    <i class="bi bi-box-arrow-right"></i>
    Logout
  </a>
</div>

{% endblock %}
