<!DOCTYPE html>
<html>
<head>
    <title>Kelola Kategori</title>

    <link rel="stylesheet"
          href="{{ url_for('static',
          filename='css/style.css') }}">
</head>
<body>

<div class="container">

    <div class="card">

        <h1>📂 Kelola Kategori</h1>

        <form method="POST">

            <input
                type="text"
                name="nama"
                placeholder="Nama Kategori"
                required>

            <button class="btn">
                Tambah
            </button>

        </form>

    </div>

    <div class="card">

        <h2>Daftar Kategori</h2>

        {% for k in kategori %}

        <p>

            {{ k[1] }}

            <a href="/hapus-kategori/{{ k[0] }}"
               class="delete-btn">

                Hapus

            </a>

        </p>

        {% endfor %}

    </div>

</div>

</body>
</html>
