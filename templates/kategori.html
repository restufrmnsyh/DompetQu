{% extends "base.html" %}
{% block title %}Kelola Kategori — DompetQu{% endblock %}
{% block content %}
<div class="page-header">
  <a href="/" class="back-btn">← Kembali</a>
  <h1>🏷️ Kelola Kategori</h1>
</div>

<div class="card">
  <form method="POST" class="inline-form">
    <input type="text" name="nama" placeholder="Nama kategori baru..." required>
    <button class="btn">Tambah</button>
  </form>
</div>

<div class="card">
  <h2 class="card-title">Daftar Kategori</h2>
  {% if kategori %}
    <div class="kat-list">
      {% for k in kategori %}
      <div class="kat-item">
        <span class="kat-name">{{ k[1] }}</span>
        <a href="/hapus-kategori/{{ k[0] }}" class="tx-btn tx-btn--del"
           onclick="return confirm('Hapus kategori {{ k[1] }}?')">🗑</a>
      </div>
      {% endfor %}
    </div>
  {% else %}
    <div class="empty-state">
      <div class="empty-icon">🏷️</div>
      <p>Belum ada kategori.</p>
    </div>
  {% endif %}
</div>
{% endblock %}
