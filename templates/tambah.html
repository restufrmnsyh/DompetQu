{% extends "base.html" %}
{% block title %}Tambah Transaksi — DompetQu{% endblock %}
{% block content %}
<div class="page-header">
  <a href="/" class="back-btn"><i class="bi bi-arrow-left"></i> Kembali</a>
  <h1><i class="bi bi-plus-circle-fill"></i> Tambah Transaksi</h1>
</div>
<div class="card">
  <form method="POST">
    <div class="form-group">
      <label>Tanggal</label>
      <input type="date" name="tanggal" value="{{ today }}" required>
    </div>
    <div class="form-group">
      <label>Jenis</label>
      <div class="jenis-toggle">
        <label class="jenis-opt">
          <input type="radio" name="jenis" value="Pengeluaran" checked>
          <span class="jenis-label expense">↓ Pengeluaran</span>
        </label>
        <label class="jenis-opt">
          <input type="radio" name="jenis" value="Pemasukan">
          <span class="jenis-label income">↑ Pemasukan</span>
        </label>
      </div>
    </div>
    <div class="form-group">
      <label>Kategori</label>
      <select name="kategori">
        {% for k in kategori %}
        <option value="{{ k[1] }}">{{ k[1] }}</option>
        {% endfor %}
      </select>
    </div>
    <div class="form-group">
      <label>Nominal (Rp)</label>
      <input type="number" name="nominal" placeholder="0" min="0" required>
    </div>
    <div class="form-group">
      <label>Catatan <span class="optional">(opsional)</span></label>
      <textarea name="catatan" placeholder="Keterangan transaksi..."></textarea>
    </div>
    <button class="btn btn-full" type="submit">Simpan Transaksi</button>
  </form>
</div>
{% endblock %}
