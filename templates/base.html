<!doctype html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}DompetQu{% endblock %}</title>
  <link rel="manifest" href="/static/manifest.json">
<meta name="theme-color" content="#10b981">
<link rel="apple-touch-icon"
      href="/static/icons/icon-192.png">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
  <link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
  {% block head %}{% endblock %}
</head>
<body>

{% if session.login %}

<nav class="top-nav">

  <div class="nav-left">
    <a href="/" class="nav-brand">
      💰 DompetQu
    </a>


<div class="nav-subtitle">
  Kelola keuanganmu dengan lebih cerdas
</div>

  </div>

  <div class="nav-right">

<button
  id="darkModeBtn"
  class="btn-icon"
  title="Dark Mode">
  <i class="bi bi-moon-fill"></i>
</button>

<a href="/profil" class="btn-icon">
    <i class="bi bi-person-circle"></i>
</a>

<a href="/logout" class="btn-icon btn-icon--danger">
    <i class="bi bi-box-arrow-right"></i>
</a>

  </div>

</nav>
{% endif %}


<div class="app-container">
  {% block content %}{% endblock %}
</div>

{% if session.login %}
<nav class="bottom-nav">
  <a href="/" class="{% if request.path == '/' %}active{% endif %}">
    <span class="nav-icon">
      <i class="bi bi-house-fill"></i>
    </span>
    <span>Home</span>
  </a>
  <a href="/tambah" class="{% if request.path == '/tambah' %}active{% endif %}">
    <span class="nav-icon">
      <i class="bi bi-plus-circle-fill"></i>
    </span>
    <span>Tambah</span>
  </a>
  <a href="/budget" class="{% if request.path == '/budget' %}active{% endif %}">
    <span class="nav-icon">
      <i class="bi bi-wallet2"></i>
    </span>
    <span>Budget</span>
  </a>
  <a href="/target" class="{% if request.path == '/target' %}active{% endif %}">
    <span class="nav-icon">
      <i class="bi bi-bullseye"></i>
    </span>
    <span>Target</span>
  </a>
  <a href="/analisis" class="{% if request.path == '/analisis' %}active{% endif %}">
  <span class="nav-icon"><i class="bi bi-bar-chart-fill"></i></span>
  <span>Analisis</span>
</a>
</nav>
{% endif %}

<script>
  const btn = document.getElementById("darkModeBtn");
  if (localStorage.getItem("darkMode") === "true") {
    document.body.classList.add("dark");
  }
  if (btn) {
    btn.addEventListener("click", () => {
      document.body.classList.toggle("dark");
      localStorage.setItem("darkMode", document.body.classList.contains("dark"));
    });
  }
</script>

{% block scripts %}{% endblock %}

<script>
if ("serviceWorker" in navigator) {
    navigator.serviceWorker.register("/static/sw.js")
        .then(() => console.log("SW Registered"));
}
</script>

<script>

const eyeSvg = `
<svg xmlns="http://www.w3.org/2000/svg" fill="none"
viewBox="0 0 24 24" stroke-width="1.5"
stroke="currentColor">

<path stroke-linecap="round"
stroke-linejoin="round"
d="M2.036 12.322a1.012 1.012 0 0 1 0-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178Z"/>

<path stroke-linecap="round"
stroke-linejoin="round"
d="M15 12a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z"/>

</svg>
`;

const eyeSlashSvg = `
<svg xmlns="http://www.w3.org/2000/svg" fill="none"
viewBox="0 0 24 24" stroke-width="1.5"
stroke="currentColor">

<path stroke-linecap="round"
stroke-linejoin="round"
d="M3.98 8.223A10.477 10.477 0 0 0 1.934 12C3.226 16.338 7.244 19.5 12 19.5c.993 0 1.953-.138 2.863-.395M6.228 6.228A10.451 10.451 0 0 1 12 4.5c4.756 0 8.773 3.162 10.065 7.498a10.522 10.522 0 0 1-4.293 5.774M6.228 6.228 3 3m3.228 3.228 3.65 3.65m7.894 7.894L21 21m-3.228-3.228-3.65-3.65m0 0a3 3 0 1 0-4.243-4.243m4.242 4.242L9.88 9.88"/>

</svg>
`;

const saldoText = document.getElementById("saldoText");
const toggleSaldo = document.getElementById("toggleSaldo");

let visible = true;
const saldoAsli = saldoText.innerText;

toggleSaldo.addEventListener("click", () => {

    visible = !visible;

    if (visible) {

        saldoText.innerText = saldoAsli;
        toggleSaldo.innerHTML = eyeSvg;

    } else {

        saldoText.innerText = "Rp ••••••••";
        toggleSaldo.innerHTML = eyeSlashSvg;

    }

});

</script>
</body>
</html>
