<!doctype html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register — DompetQu</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
</head>
<body class="auth-body">

  <div class="auth-bg">
    <div class="auth-blob b1"></div>
    <div class="auth-blob b2"></div>
    <div class="auth-blob b3"></div>
  </div>

  <div class="auth-wrap">

    <div class="auth-brand">
      <div class="auth-logo">💰</div>
      <h1>DompetQu</h1>
      <p>Catat. Analisa. Hemat.</p>
    </div>

    <div class="auth-card">
      <div class="auth-card-header">
        <h2>Buat Akun Baru 🚀</h2>
        <p>Mulai kelola keuanganmu sekarang</p>
      </div>

      <form method="POST">
        <div class="auth-input-group">
          <span class="auth-input-icon"><i class="bi bi-person-fill"></i></span>
          <input type="text" name="username" placeholder="Buat username" required autofocus>
        </div>

        <div class="auth-input-group">
          <span class="auth-input-icon"><i class="bi bi-lock-fill"></i></span>
          <input type="password" name="password" id="passwordInput" placeholder="Buat password" required>
          <button type="button" class="auth-eye-btn" onclick="togglePassword()">
            <i class="bi bi-eye" id="eyeIcon"></i>
          </button>
        </div>

        <div class="auth-input-group">
          <span class="auth-input-icon"><i class="bi bi-shield-lock-fill"></i></span>
          <input type="password" name="konfirmasi_password" id="konfirmasiInput"
                 placeholder="Konfirmasi password" required>
          <button type="button" class="auth-eye-btn" onclick="toggleKonfirmasi()">
            <i class="bi bi-eye" id="eyeIcon2"></i>
          </button>
        </div>

        {% if pesan %}
        <div class="auth-alert">
          <i class="bi bi-exclamation-circle-fill"></i> {{ pesan }}
        </div>
        {% endif %}

        <button class="auth-btn" type="submit">
          <i class="bi bi-person-plus-fill"></i> Daftar Sekarang
        </button>
      </form>

      <div class="auth-divider"><span>atau</span></div>

      <div class="auth-footer">
        Sudah punya akun?
        <a href="/login">Masuk Sekarang →</a>
      </div>
    </div>

  </div>

  <script>
  function togglePassword() {
    const input = document.getElementById("passwordInput");
    const icon  = document.getElementById("eyeIcon");
    input.type = input.type === "password" ? "text" : "password";
    icon.className = input.type === "password" ? "bi bi-eye" : "bi bi-eye-slash";
  }
  function toggleKonfirmasi() {
    const input = document.getElementById("konfirmasiInput");
    const icon  = document.getElementById("eyeIcon2");
    input.type = input.type === "password" ? "text" : "password";
    icon.className = input.type === "password" ? "bi bi-eye" : "bi bi-eye-slash";
  }
  </script>

  <script>

// Validasi konfirmasi password real-time
const passInput     = document.getElementById("passwordInput");
const konfirmInput  = document.getElementById("konfirmasiInput");
const submitBtn     = document.querySelector(".auth-btn");

function cekKonfirmasi() {
  const pass     = passInput.value;
  const konfirm  = konfirmInput.value;

  // Hapus pesan lama
  const existing = document.getElementById("matchMsg");
  if (existing) existing.remove();

  if (konfirm.length === 0) return;

  const msg = document.createElement("div");
  msg.id = "matchMsg";
  msg.style.cssText = "font-size:12px; margin:-6px 0 10px; padding: 6px 12px; border-radius:8px; display:flex; align-items:center; gap:6px;";

  if (pass === konfirm) {
    msg.style.background = "#d1fae5";
    msg.style.color = "#065f46";
    msg.innerHTML = '<i class="bi bi-check-circle-fill"></i> Password cocok';
    submitBtn.disabled = false;
    submitBtn.style.opacity = "1";
  } else {
    msg.style.background = "#fee2e2";
    msg.style.color = "#991b1b";
    msg.innerHTML = '<i class="bi bi-x-circle-fill"></i> Password tidak cocok';
    submitBtn.disabled = true;
    submitBtn.style.opacity = "0.5";
  }

  konfirmInput.closest(".auth-input-group").insertAdjacentElement("afterend", msg);
}

konfirmInput.addEventListener("input", cekKonfirmasi);
passInput.addEventListener("input", () => {
  if (konfirmInput.value.length > 0) cekKonfirmasi();
});
</script>
</body>
</html>
